<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header: Time and Settings -->
    <header class="header">
        <div class="header-controls">
            <div class="header-time-wrap">
                <span id="header-time" class="header-time">00:00</span>
                <div class="day-progress">
                    <div id="day-progress-fill" class="day-progress-fill"></div>
                </div>
                <!-- Hover tooltip with multiple progress bars -->
                <div class="progress-tooltip">
                    <div class="progress-row">
                        <span class="progress-label">Day</span>
                        <div class="progress-track"><div id="pt-day" class="progress-fill"></div></div>
                        <span id="pt-day-pct" class="progress-pct">0%</span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">Week</span>
                        <div class="progress-track"><div id="pt-week" class="progress-fill"></div></div>
                        <span id="pt-week-pct" class="progress-pct">0%</span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">Month</span>
                        <div class="progress-track"><div id="pt-month" class="progress-fill"></div></div>
                        <span id="pt-month-pct" class="progress-pct">0%</span>
                    </div>
                    <div class="progress-row">
                        <span class="progress-label">Year</span>
                        <div class="progress-track"><div id="pt-year" class="progress-fill"></div></div>
                        <span id="pt-year-pct" class="progress-pct">0%</span>
                    </div>
                </div>
            </div>
            <div class="header-divider"></div>
            <button id="theme-toggle" class="icon-btn" title="Toggle theme">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </button>
            <button id="settings-toggle" class="icon-btn" title="Settings">
                <span class="material-symbols-outlined">settings</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Greeting and Date -->
        <div class="greeting-section">
            <h1 id="greeting" class="greeting-text">Good Morning</h1>
            <p id="current-date" class="date-text">Loading...</p>
        </div>

        <!-- Search Bar -->
        <div class="search-wrapper">
            <div class="search-engine-wrap" id="engine-picker">
                <button class="engine-trigger" id="engine-trigger" title="Switch search engine" aria-haspopup="true" aria-expanded="false">
                    <!-- Google icon (shown by default) -->
                    <svg id="icon-google" class="engine-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                    </svg>
                    <!-- Perplexity icon (hidden by default) -->
                    <svg id="icon-perplexity" class="engine-icon" style="display:none" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M1.665 0h7.742l3.596 3.58L16.6 0h5.734v8.31l-2.128 2.13 2.128 2.013V24h-7.645l-3.492-3.574L7.803 24H.001V12.453l2.042-2.013L.001 8.31V0h1.664zm5.356 1.997H1.997v5.519l3.643 3.508-3.643 3.45v7.537h5.02l3.985-4.018v-7.25L6.375 7.16l3.627-3.575V1.997H6.74l.281-.001zM22.003 1.997h-5.02l-3.984 4.017v7.25l4.607 3.584-3.627 3.575v1.587h5.024v-5.519l-3.644-3.507 3.644-3.451V1.997zM12 5.626L8.75 8.878 12 12.018l3.25-3.14L12 5.626z"/>
                    </svg>
                    <!-- ChatGPT/OpenAI icon (hidden by default) -->
                    <svg id="icon-chatgpt" class="engine-icon" style="display:none" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.843-3.371 2.019-1.168a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.4-.679zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.497v2.999l-2.597 1.5-2.607-1.5z"/>
                    </svg>
                </button>
                <!-- Engine dropdown -->
                <div class="engine-dropdown" id="engine-dropdown" role="menu">
                    <button class="engine-option engine-option--active" data-engine="google" role="menuitem">
                        <svg class="engine-option-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                        </svg>
                        <span>Google</span>
                    </button>
                    <button class="engine-option" data-engine="perplexity" role="menuitem">
                        <svg class="engine-option-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M1.665 0h7.742l3.596 3.58L16.6 0h5.734v8.31l-2.128 2.13 2.128 2.013V24h-7.645l-3.492-3.574L7.803 24H.001V12.453l2.042-2.013L.001 8.31V0h1.664zm5.356 1.997H1.997v5.519l3.643 3.508-3.643 3.45v7.537h5.02l3.985-4.018v-7.25L6.375 7.16l3.627-3.575V1.997H6.74l.281-.001zM22.003 1.997h-5.02l-3.984 4.017v7.25l4.607 3.584-3.627 3.575v1.587h5.024v-5.519l-3.644-3.507 3.644-3.451V1.997zM12 5.626L8.75 8.878 12 12.018l3.25-3.14L12 5.626z"/>
                        </svg>
                        <span>Perplexity</span>
                    </button>
                    <button class="engine-option" data-engine="chatgpt" role="menuitem">
                        <svg class="engine-option-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.843-3.371 2.019-1.168a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.4-.679zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.497v2.999l-2.597 1.5-2.607-1.5z"/>
                        </svg>
                        <span>ChatGPT</span>
                    </button>
                </div>
            </div>
            <input
                id="search-input"
                class="search-input"
                placeholder="Search Google or type a URL"
                type="text"
                autocomplete="off"
                autofocus
            />
        </div>

        <!-- Quick Links -->
        <div id="quick-links-container" class="quick-links-grid">
            <!-- Links generated by JS -->
        </div>
    </main>

    <!-- Footer: Productivity Bar -->
    <footer class="footer">
        <div class="productivity-bar">

            <!-- Focus Timer -->
            <div class="timer-section">
                <div class="timer-info">
                    <span class="timer-label">Focus</span>
                    <span id="timer-display" class="timer-time">25:00</span>
                </div>
                <div class="timer-controls">
                    <button id="timer-play" class="timer-btn timer-btn-play" title="Start">
                        <span class="material-symbols-outlined timer-icon-filled">play_arrow</span>
                    </button>
                    <button id="timer-reset" class="timer-btn timer-btn-reset" title="Reset">
                        <span class="material-symbols-outlined">refresh</span>
                    </button>
                </div>
            </div>

            <!-- Daily Goals -->
            <div class="goals-section">
                <div id="goals-container" class="goals-list">
                    <!-- Goals generated by JS -->
                </div>
                <button id="edit-goals" class="edit-goals-btn">Edit</button>
            </div>
        </div>
    </footer>

    <!-- Background Gradients -->
    <div class="bg-gradients">
        <div class="bg-gradient bg-gradient-1"></div>
        <div class="bg-gradient bg-gradient-2"></div>
    </div>

    <!-- Settings Panel (slides in from right) -->
    <div id="settings-overlay" class="settings-overlay hidden"></div>
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-header">
            <h2>Settings</h2>
            <button id="settings-close" class="settings-close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div class="settings-body">
            <!-- Profile -->
            <section class="settings-section">
                <h3 class="settings-section-title">Profile</h3>
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="settings-name" placeholder="Enter your name">
                </div>
            </section>

            <!-- Quick Links -->
            <section class="settings-section">
                <div class="settings-section-header">
                    <h3 class="settings-section-title">Quick Links</h3>
                    <button id="add-link-btn" class="btn btn-small btn-primary">
                        <span class="material-symbols-outlined" style="font-size:16px">add</span>
                        Add
                    </button>
                </div>
                <div id="settings-links-list" class="settings-links-list"></div>
            </section>

            <!-- Focus Timer -->
            <section class="settings-section">
                <h3 class="settings-section-title">Focus Timer</h3>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="settings-timer-duration" min="1" max="120" value="25">
                </div>
                <div class="settings-stat">
                    <span class="settings-stat-label">Sessions completed</span>
                    <span id="settings-session-count" class="settings-stat-value">0</span>
                </div>
            </section>

            <!-- Daily Goals -->
            <section class="settings-section">
                <h3 class="settings-section-title">Daily Goals</h3>
                <div id="settings-goals-list" class="settings-goals-list"></div>
            </section>

            <!-- Data -->
            <section class="settings-section">
                <h3 class="settings-section-title">Data</h3>
                <button id="reset-all-btn" class="btn btn-danger">Reset All Data</button>
            </section>
        </div>

        <div class="settings-footer">
            <button id="settings-save" class="btn btn-primary btn-full">Save Settings</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
